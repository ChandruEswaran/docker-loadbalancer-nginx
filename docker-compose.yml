version: '3'
services:
  app1:
    build: ./app
    container_name: app1
  app2:
    build: ./app
    container_name: app2
  app3:
    build: ./app
    container_name: app3

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2
      - app3